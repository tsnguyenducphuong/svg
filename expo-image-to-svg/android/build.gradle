apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'expo.modules.imagetosvg'
version = '0.3.0'

// 1. Integration with Expo Modules Core Plugin
def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()
useExpoPublishing()

// 2. Helper for flexible SDK versions
buildscript {
    ext.safeExtGet = { prop, fallback ->
        rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }
}

android {
    // Unique namespace for your module
    namespace "expo.modules.imagetosvg"
    
    compileSdkVersion safeExtGet("compileSdkVersion", 35)

    defaultConfig {
        minSdkVersion safeExtGet("minSdkVersion", 23) // Required for JSI/C++
        targetSdkVersion safeExtGet("targetSdkVersion", 35)
        versionCode 1
        versionName "0.3.0"

        // 3. Keep your C++ / CMake configuration
        externalNativeBuild {
            cmake {
                cppFlags "-O3 -frtti -fexceptions -std=c++17"
                arguments "-DANDROID_STL=c++_shared","-DREACT_NATIVE_DIR=${projectDir}/../node_modules/react-native"
                // Ensure the NDK builds for the correct architectures
                abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            }
        }

        //Enable Prefab so CMake can find ReactAndroid package
        buildFeatures {
            prefab true
        }
    }

    // 4. Link to your CMakeLists.txt
    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }

    lintOptions {
        abortOnError false
    }

    packagingOptions {
        // Essential for JSI modules to avoid library conflicts
        pickFirst '**/libexpo-image-to-svg.so'
        // React Native often provides these; picking first prevents duplicate SO errors
        pickFirst '**/libc++_shared.so'
    }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"
  implementation "com.facebook.react:react-android:+"
  // JSI headers (needed for javaScriptContextHolder / JSI runtime ptr)
  implementation "com.facebook.react:hermes-android:+"
}
